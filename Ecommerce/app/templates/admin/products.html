{% extends "base.html" %}
{% block title %}Admin Products{% endblock %}
{% block content %}
<main class="page-container panel">
  <h1>Manage Products</h1>
  <form method="post" class="stacked-form">
    <input name="name" placeholder="Product name" required>
    <input name="category" placeholder="Category" required>
    <input name="price" type="number" step="0.01" placeholder="Price" required>
    <input name="mrp" type="number" step="0.01" placeholder="MRP" required>
    <input name="rating" type="number" step="0.1" min="1" max="5" value="4" required>
    <input name="stock" type="number" placeholder="Stock" required>
    <input name="image" placeholder="Image URL" required>
    <textarea name="description" placeholder="Description" required></textarea>
    <button type="submit">Add Product</button>
  </form>
  <table class="table">
    <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th></tr></thead>
    <tbody>
      {% for p in products %}
      <tr><td>{{ p.id }}</td><td>{{ p.name }}</td><td>{{ p.category }}</td><td>{{ p.price }}</td><td>{{ p.stock }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</main>
{% endblock %}
