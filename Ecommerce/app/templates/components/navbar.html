<header class="nav-wrap">
  <div class="nav-main">
    <a href="{{ url_for('web.home') }}" class="logo">PyStore.in</a>
    <form method="get" action="{{ url_for('web.home') }}" class="search-bar">
      <input name="q" placeholder="Search products, brands and more" value="{{ request.args.get('q', '') }}">
      <button type="submit">Search</button>
    </form>
    <nav class="quick-links">
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('web.orders_page') }}">Returns & Orders</a>
      <a href="{{ url_for('web.wishlist_page') }}">Wishlist</a>
      <a href="{{ url_for('web.cart_page') }}">Cart</a>
      <a href="{{ url_for('web.addresses_page') }}">Addresses</a>
      {% if current_user.is_admin %}<a href="{{ url_for('admin.dashboard') }}">Admin</a>{% endif %}
      <a href="{{ url_for('auth.logout') }}">Logout</a>
      {% else %}
      <a href="{{ url_for('auth.login_page') }}">Sign in</a>
      <a href="{{ url_for('auth.register_page') }}">Register</a>
      {% endif %}
    </nav>
  </div>
</header>
