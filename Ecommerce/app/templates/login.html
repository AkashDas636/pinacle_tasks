{% extends "base.html" %}
{% block title %}Login | PyStore{% endblock %}
{% block content %}
<main class="page-container auth-box">
  <h1>Sign in</h1>
  <form method="post" class="stacked-form">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p>New user? <a href="{{ url_for('auth.register_page') }}">Create account</a></p>
</main>
{% endblock %}
