{% extends "base.html" %}
{% block title %}Wishlist | PyStore{% endblock %}
{% block content %}
<main class="page-container panel">
  <h1>Your Wishlist</h1>
  <div class="product-grid">
    {% for p in items %}
    <article class="product-card">
      <a href="{{ url_for('web.product_page', product_id=p.id) }}">
        <img src="{{ p.image }}" alt="{{ p.name }}">
        <h4>{{ p.name }}</h4>
      </a>
      <p><strong>₹{{ '%.0f'|format(p.price) }}</strong></p>
      <div class="btn-row">
        <button onclick="addToCart({{ p.id }})">Add to Cart</button>
        <button class="secondary" onclick="toggleWishlist({{ p.id }})">Remove</button>
      </div>
    </article>
    {% else %}
    <p>No wishlist items yet.</p>
    {% endfor %}
  </div>
</main>
{% endblock %}
