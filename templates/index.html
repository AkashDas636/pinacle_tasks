<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📅 ChronoCalendar | Smart Reminders</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    /* ─── Design Tokens & System ────────────────────────────────── */
    :root {
      --bg: #070913;
      --bg-gradient: radial-gradient(circle at 50% 0%, #161233 0%, #070913 70%);
      --card-bg: rgba(15, 18, 36, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-glow: rgba(124, 106, 247, 0.15);
      
      --primary: #7c6af7;
      --primary-hover: #907ff9;
      --primary-glow: rgba(124, 106, 247, 0.4);
      --primary-rgb: 124, 106, 247;
      
      --accent: #a78bfa;
      --text: #f8fafc;
      --text-muted: #64748b;
      --border-focus: rgba(124, 106, 247, 0.4);
      
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.2);
      --danger: #f43f5e;
      --danger-glow: rgba(244, 63, 94, 0.2);
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.2);
      
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* ─── Global Reset & Scrollbars ────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: var(--bg);
      background-image: var(--bg-gradient);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(var(--primary-rgb), 0.3);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* ─── Header Styling ────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 35px;
      animation: fadeInDown 0.8s var(--transition-bounce);
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    header p {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ─── Layout Dashboard Grid ─────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 30px;
      width: 100%;
      max-width: 1200px;
      animation: fadeInUp 0.8s var(--transition-bounce) 0.1s both;
    }

    @media (max-width: 992px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* ─── Glassmorphism Card Style ──────────────────────────────── */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--card-border);
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0.8;
    }

    .glass-card:hover {
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px var(--card-glow);
      border-color: rgba(var(--primary-rgb), 0.25);
    }

    /* ─── Calendar Panel ────────────────────────────────────────── */
    .calendar-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 20px;
    }

    .calendar-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .calendar-title span.month {
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .calendar-title span.year {
      font-family: var(--font-mono);
      font-weight: 400;
      color: var(--text-muted);
      font-size: 1.2rem;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
      transform: translateY(-2px);
    }

    .nav-btn:active {
      transform: translateY(0);
    }

    /* Calendar Grid */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekday-header {
      text-align: center;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 8px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .day-cell {
      aspect-ratio: 1.3;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.01);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      cursor: pointer;
      transition: var(--transition-smooth);
      position: relative;
    }

    .day-cell:hover:not(.empty-cell) {
      background: rgba(var(--primary-rgb), 0.1);
      border-color: rgba(var(--primary-rgb), 0.4);
      transform: scale(1.03);
    }

    .day-cell.empty-cell {
      border: none;
      background: transparent;
      cursor: default;
      pointer-events: none;
    }

    .day-number {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--text);
    }

    .day-cell.today {
      border: 1.5px solid var(--primary);
      background: rgba(var(--primary-rgb), 0.15);
      box-shadow: inset 0 0 10px rgba(var(--primary-rgb), 0.2);
    }

    .day-cell.today .day-number {
      color: var(--accent);
      font-weight: 700;
    }

    .day-cell.selected {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: var(--primary);
      box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.35);
    }

    .day-cell.selected .day-number {
      color: #ffffff;
    }

    /* Glow dots for days with reminders */
    .indicator-dots {
      display: flex;
      justify-content: center;
      gap: 3px;
      height: 6px;
      width: 100%;
    }

    .glow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    .day-cell.selected .glow-dot {
      background: #ffffff;
      box-shadow: 0 0 8px #ffffff;
    }

    /* ─── Reminders Panel ───────────────────────────────────────── */
    .reminders-container {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .reminders-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 15px;
    }

    .reminders-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .selected-date-title {
      font-size: 0.9rem;
      color: var(--accent);
      margin-top: 4px;
      font-family: var(--font-mono);
    }

    /* Statistics Widgets */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-badge {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: var(--transition-smooth);
    }

    .stat-badge:hover {
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-2px);
    }

    .stat-val {
      font-size: 1.5rem;
      font-weight: 800;
      font-family: var(--font-mono);
    }

    .stat-lbl {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
    }

    #stat-pending { color: var(--warning); }
    #stat-completed { color: var(--success); }
    #stat-total { color: var(--primary-hover); }

    /* New Reminder Form */
    .reminder-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 18px;
      border-radius: 18px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 576px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition-smooth);
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.2);
      background: rgba(0, 0, 0, 0.50);
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #ffffff;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition-smooth);
      margin-top: 5px;
    }

    .btn-submit:hover {
      box-shadow: 0 5px 15px var(--primary-glow);
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* Reminders List */
    .reminders-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.92rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px dashed rgba(255, 255, 255, 0.07);
      border-radius: 16px;
    }

    .empty-icon {
      font-size: 2.2rem;
      opacity: 0.7;
    }

    /* Reminder Item Card */
    .reminder-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: var(--transition-smooth);
      animation: slideInUp 0.4s ease;
    }

    .reminder-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(var(--primary-rgb), 0.2);
      transform: translateX(4px);
    }

    .reminder-item.completed {
      background: rgba(16, 185, 129, 0.02);
      border-color: rgba(16, 185, 129, 0.1);
    }

    /* Beautiful custom checkbox */
    .checkbox-container {
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      user-select: none;
    }

    .checkbox-container input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }

    .checkmark {
      height: 22px;
      width: 22px;
      border: 2px solid var(--text-muted);
      border-radius: 6px;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-container:hover input ~ .checkmark {
      border-color: var(--primary);
      background: rgba(var(--primary-rgb), 0.1);
    }

    .checkbox-container input:checked ~ .checkmark {
      background-color: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 10px var(--success-glow);
    }

    .checkmark:after {
      content: "";
      display: none;
      width: 5px;
      height: 10px;
      border: solid #ffffff;
      border-width: 0 2.5px 2.5px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .checkbox-container input:checked ~ .checkmark:after {
      display: block;
    }

    .reminder-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .reminder-title {
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text);
      transition: var(--transition-smooth);
    }

    .reminder-item.completed .reminder-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .reminder-notes {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .reminder-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 2px;
    }

    .reminder-time {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(var(--primary-rgb), 0.1);
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* Category Badge Colors */
    .category-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }

    .badge-general { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); }
    .badge-work { background: rgba(var(--primary-rgb), 0.12); color: var(--accent); border: 1px solid rgba(var(--primary-rgb), 0.15); }
    .badge-personal { background: rgba(245, 158, 11, 0.12); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.15); }
    .badge-health { background: rgba(16, 185, 129, 0.12); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.15); }
    .badge-shopping { background: rgba(244, 63, 94, 0.12); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.15); }

    .btn-delete {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .btn-delete:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: #ffffff;
      box-shadow: 0 0 10px var(--danger-glow);
      transform: scale(1.05);
    }

    /* ─── Footer ────────────────────────────────────────────────── */
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ─── Keyframe Animations ───────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>
<body>

  <!-- Dynamic ambient glowing particles in background -->
  <div style="position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(var(--primary-rgb),0.12) 0%, transparent 70%); top: 10%; left: 5%; pointer-events: none; z-index: -1;"></div>
  <div style="position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); bottom: 10%; right: 5%; pointer-events: none; z-index: -1;"></div>

  <header>
    <h1>📅 ChronoCalendar</h1>
    <p>Smart agenda, task planner, & visual schedules</p>
  </header>

  <main class="dashboard">
    
    <!-- LEFT PANEL: Visual Calendar -->
    <section class="glass-card calendar-container">
      <div class="calendar-header">
        <div class="calendar-title">
          <span class="month" id="monthName">May</span>
          <span class="year" id="yearDisplay">2026</span>
        </div>
        <div class="calendar-nav">
          <button class="nav-btn" onclick="changeMonth(-1)" title="Previous Month">←</button>
          <button class="nav-btn" onclick="goToToday()" title="Jump to Today">Today</button>
          <button class="nav-btn" onclick="changeMonth(1)" title="Next Month">→</button>
        </div>
      </div>

      <div class="calendar-grid">
        <!-- Weekday Headers -->
        <div class="weekday-header">Sun</div>
        <div class="weekday-header">Mon</div>
        <div class="weekday-header">Tue</div>
        <div class="weekday-header">Wed</div>
        <div class="weekday-header">Thu</div>
        <div class="weekday-header">Fri</div>
        <div class="weekday-header">Sat</div>
      </div>
      
      <!-- Days Grid (rendered dynamically) -->
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <!-- RIGHT PANEL: Reminder Agenda -->
    <section class="glass-card reminders-container">
      <div class="reminders-header">
        <h2>📋 Daily Schedule</h2>
        <div class="selected-date-title" id="selectedDateDisplay">Friday, May 29, 2026</div>
      </div>

      <!-- Quick stats widgets -->
      <div class="stats-container">
        <div class="stat-badge">
          <div class="stat-val" id="stat-pending">0</div>
          <div class="stat-lbl">Pending</div>
        </div>
        <div class="stat-badge">
          <div class="stat-val" id="stat-completed">0</div>
          <div class="stat-lbl">Done</div>
        </div>
        <div class="stat-badge">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
      </div>

      <!-- Task/Reminder Add Form -->
      <div class="reminder-form">
        <div class="form-group">
          <label for="remTitle">Task / Reminder Title *</label>
          <input type="text" id="remTitle" class="form-input" placeholder="e.g. Project Sync meeting" required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="remTime">Time</label>
            <input type="time" id="remTime" class="form-input">
          </div>
          <div class="form-group">
            <label for="remCategory">Category</label>
            <select id="remCategory" class="form-input">
              <option value="General">General</option>
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Health">Health</option>
              <option value="Shopping">Shopping</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="remNote">Note / Description</label>
          <input type="text" id="remNote" class="form-input" placeholder="Optional details...">
        </div>

        <button class="btn-submit" onclick="submitReminder()">
          <span>+ Add Reminder</span>
        </button>
      </div>

      <!-- Active Day Reminders List -->
      <div class="reminders-list" id="remindersList">
        <!-- Rendered dynamically -->
      </div>
    </section>

  </main>

  <footer>
    <p>ChronoCalendar &copy; 2026. Made with styling elegance & Flask.</p>
  </footer>

  <!-- ─── Interactive JS Engine ────────────────────────────────── -->
  <script>
    // State management
    const today = new Date();
    let currentYear = today.getFullYear();
    let currentMonth = today.getMonth(); // 0-indexed
    let selectedDateStr = formatDate(today); // YYYY-MM-DD
    
    // Helper to format date object to YYYY-MM-DD local string
    function formatDate(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // Format YYYY-MM-DD to human readable string (e.g. Friday, May 29, 2026)
    function formatHumanDate(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      return date.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    // Initialize application
    document.addEventListener('DOMContentLoaded', () => {
      loadCalendarAndStats();
      loadRemindersForDate();
    });

    // Main caller to load calendar data & system-wide statistics
    function loadCalendarAndStats() {
      // 1. Fetch Calendar Grid from Flask API
      fetch(`/api/calendar?year=${currentYear}&month=${currentMonth + 1}`)
        .then(response => response.json())
        .then(data => {
          // Set labels
          document.getElementById('monthName').innerText = data.month_name;
          document.getElementById('yearDisplay').innerText = data.year;
          
          const grid = document.getElementById('calendarGrid');
          grid.innerHTML = ''; // Clear existing days
          
          // Render Days Grid
          data.days.forEach(week => {
            week.forEach(dayStr => {
              const cell = document.createElement('div');
              
              if (!dayStr) {
                // Empty cells at edges of month
                cell.className = 'day-cell empty-cell';
              } else {
                cell.className = 'day-cell';
                const dayNum = parseInt(dayStr.split('-')[2]);
                
                // Add content
                cell.innerHTML = `
                  <span class="day-number">${dayNum}</span>
                  <div class="indicator-dots"></div>
                `;
                
                // Set selections
                if (dayStr === selectedDateStr) {
                  cell.classList.add('selected');
                }
                
                const todayStr = formatDate(today);
                if (dayStr === todayStr) {
                  cell.classList.add('today');
                }
                
                // Check if this date has pending reminders
                if (data.reminder_dates.includes(dayStr)) {
                  cell.querySelector('.indicator-dots').innerHTML = '<div class="glow-dot"></div>';
                }
                
                // Event listener
                cell.onclick = () => selectDate(dayStr);
              }
              grid.appendChild(cell);
            });
          });
        })
        .catch(err => console.error("Error loading calendar API: ", err));

      // 2. Fetch statistics
      fetch('/api/stats')
        .then(r => r.json())
        .then(stats => {
          document.getElementById('stat-pending').innerText = stats.pending;
          document.getElementById('stat-completed').innerText = stats.done;
          document.getElementById('stat-total').innerText = stats.total;
        })
        .catch(err => console.error("Error loading stats API: ", err));
    }

    // Select date click handler
    function selectDate(dateStr) {
      selectedDateStr = dateStr;
      document.getElementById('selectedDateDisplay').innerText = formatHumanDate(dateStr);
      
      // Update visual calendar grid selections immediately
      document.querySelectorAll('.day-cell').forEach(cell => {
        cell.classList.remove('selected');
      });
      
      // Load reminders
      loadRemindersForDate();
      
      // Reload calendar to refresh selected state class
      loadCalendarAndStats();
    }

    // Load list of reminders for currently selected date
    function loadRemindersForDate() {
      document.getElementById('selectedDateDisplay').innerText = formatHumanDate(selectedDateStr);
      
      fetch(`/api/reminders?date=${selectedDateStr}`)
        .then(response => response.json())
        .then(reminders => {
          const list = document.getElementById('remindersList');
          list.innerHTML = '';
          
          if (reminders.length === 0) {
            list.innerHTML = `
              <div class="empty-state">
                <span class="empty-icon">📅</span>
                <p>No reminders scheduled for this day.</p>
              </div>
            `;
            return;
          }
          
          reminders.forEach(item => {
            const row = document.createElement('div');
            row.className = `reminder-item ${item.done ? 'completed' : ''}`;
            
            // Get Category Badge Style Class
            const catLower = item.category.toLowerCase();
            const badgeClass = `badge-${catLower}`;
            
            row.innerHTML = `
              <label class="checkbox-container">
                <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleReminderDone(${item.id}, this.checked)">
                <span class="checkmark"></span>
              </label>
              <div class="reminder-content">
                <span class="reminder-title">${item.title}</span>
                ${item.note ? `<p class="reminder-notes">${item.note}</p>` : ''}
                <div class="reminder-meta">
                  <span class="category-badge ${badgeClass}">${item.category}</span>
                  ${item.time ? `<span class="reminder-time">🕐 ${item.time}</span>` : ''}
                </div>
              </div>
              <button class="btn-delete" onclick="deleteReminder(${item.id})" title="Delete Reminder">🗑</button>
            `;
            list.appendChild(row);
          });
        })
        .catch(err => console.error("Error loading reminders: ", err));
    }

    // Add reminder form submit handler
    function submitReminder() {
      const titleInput = document.getElementById('remTitle');
      const timeInput = document.getElementById('remTime');
      const catSelect = document.getElementById('remCategory');
      const noteInput = document.getElementById('remNote');
      
      const title = titleInput.value.trim();
      if (!title) {
        alert("Please enter a title for your reminder!");
        return;
      }
      
      const newReminder = {
        date: selectedDateStr,
        title: title,
        time: timeInput.value,
        category: catSelect.value,
        note: noteInput.value.trim()
      };
      
      fetch('/api/reminders', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(newReminder)
      })
      .then(response => response.json())
      .then(res => {
        if (res.success) {
          // Reset form fields
          titleInput.value = '';
          timeInput.value = '';
          noteInput.value = '';
          catSelect.value = 'General';
          
          // Reload
          loadRemindersForDate();
          loadCalendarAndStats();
        } else {
          alert("Error adding reminder: " + res.error);
        }
      })
      .catch(err => console.error("Error adding reminder:", err));
    }

    // Mark reminder as Done / Toggle Status
    function toggleReminderDone(id, isChecked) {
      fetch(`/api/reminders/${id}/done`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ done: isChecked ? 1 : 0 })
      })
      .then(response => response.json())
      .then(res => {
        if (res.success) {
          loadRemindersForDate();
          loadCalendarAndStats();
        }
      })
      .catch(err => console.error("Error status update:", err));
    }

    // Delete a reminder
    function deleteReminder(id) {
      if (!confirm("Are you sure you want to delete this reminder?")) return;
      
      fetch(`/api/reminders/${id}`, {
        method: 'DELETE'
      })
      .then(response => response.json())
      .then(res => {
        if (res.success) {
          loadRemindersForDate();
          loadCalendarAndStats();
        }
      })
      .catch(err => console.error("Error deleting:", err));
    }

    // Navigation Controls
    function changeMonth(direction) {
      currentMonth += direction;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear += 1;
      } else if (currentMonth < 0) {
        currentMonth = 11;
        currentYear -= 1;
      }
      loadCalendarAndStats();
    }

    function goToToday() {
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      selectedDateStr = formatDate(today);
      selectDate(selectedDateStr);
    }
  </script>
</body>
</html>
